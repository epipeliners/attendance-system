<!DOCTYPE html>
<html>
<head>
    <title>Setup 2FA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h3>Setup Two-Factor Authentication</h3>
                    </div>
                    <div class="card-body">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }}">{{ message }}</div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        
                        <div class="row">
                            <div class="col-md-6 text-center">
                                <h5>Scan QR Code</h5>
                                <img src="{{ qr_code }}" alt="2FA QR Code" class="img-fluid mb-3">
                                <p><small>Scan with Google Authenticator</small></p>
                            </div>
                            <div class="col-md-6">
                                <h5>Or Enter Secret Manually</h5>
                                <p><code>{{ secret }}</code></p>
                                
                                <form method="POST" action="{{ url_for('auth.verify_2fa_setup') }}">
                                    <div class="mb-3">
                                        <label>Enter 6-digit Code</label>
                                        <input type="text" name="code" class="form-control" 
                                               pattern="[0-9]{6}" maxlength="6" required>
                                    </div>
                                    <input type="hidden" name="secret" value="{{ secret }}">
                                    <button type="submit" class="btn btn-success w-100">Verify & Enable</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
